<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpaceTTVK</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="brand">
      <span class="brand-mark">K</span>
      <div>
        SpaceTTVK
        <span class="brand-sub">7TV · BTTV · FFZ for Kick</span>
      </div>
    </div>

    <input type="checkbox" id="enabled" class="ch" checked />
    <label for="enabled">
      <span class="box"></span><span class="text">SpaceTTVK emotes</span
      ><span class="icon">☺</span>
    </label>

    <div class="nested">
      <input type="checkbox" id="emotes_7tv" class="ch" checked />
      <label for="emotes_7tv">
        <span class="box"></span><span class="text">7TV emotes</span
        ><span class="icon">7</span>
      </label>

      <input type="checkbox" id="emotes_bttv" class="ch" checked />
      <label for="emotes_bttv">
        <span class="box"></span><span class="text">BTTV emotes</span
        ><span class="icon">B</span>
      </label>

      <input type="checkbox" id="emotes_ffz" class="ch" checked />
      <label for="emotes_ffz">
        <span class="box"></span><span class="text">FFZ emotes</span
        ><span class="icon">F</span>
      </label>
    </div>

    <input type="checkbox" id="colon_autocomplete" class="ch" checked />
    <label for="colon_autocomplete">
      <span class="box"></span><span class="text">Colon autocomplete</span
      ><span class="icon">:</span>
    </label>

    <input type="checkbox" id="chat_render" class="ch" checked />
    <label for="chat_render">
      <span class="box"></span><span class="text">Emotes in chat</span
      ><span class="icon">▣</span>
    </label>

    <input type="checkbox" id="hide_kick_native" class="ch" checked />
    <label for="hide_kick_native">
      <span class="box"></span><span class="text">Hide Kick native picker</span
      ><span class="icon">✕</span>
    </label>

    <input type="checkbox" id="show_favorites" class="ch" checked />
    <label for="show_favorites">
      <span class="box"></span><span class="text">Favorites in autocomplete</span
      ><span class="icon">★</span>
    </label>

    <section class="favorites">
      <h3>★ Favorites · <span class="fav-count" id="stat-favs">0</span></h3>
      <div id="fav-list"></div>
      <p class="empty" id="fav-hint">Alt+click an emote in chat to favorite it</p>
    </section>

    <script src="src/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
